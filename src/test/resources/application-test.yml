hos:
  download:
    movies-path: ${java.io.tmpdir}/hos-test/movies
    tv-shows-path: ${java.io.tmpdir}/hos-test/tvshows
    temp-path: ${java.io.tmpdir}/hos-test/temp
    parallel-downloads: 1
    default-quality: best
    default-language: en
  tmdb:
    api-key:  # blank → TMDB bean is null → VixSrc search returns empty
  monitoring:
    enabled: false  # disable scheduled background checks
  extractor:
    base-url: http://localhost:0  # overridden at runtime by @DynamicPropertySource

raiplay:
  username: ""  # blank → RaiPlayAuthService conditional bean does not instantiate
  password: ""

spring:
  datasource:
    url: jdbc:sqlite:/tmp/hos-integration-test.db
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

logging:
  level:
    com.github.stormino: WARN
    org.flywaydb: WARN
