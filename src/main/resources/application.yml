vixsrc:
  download:
    movies-path: ${DOWNLOAD_MOVIES_PATH:downloads/movies}
    tv-shows-path: ${DOWNLOAD_TV_SHOWS_PATH:downloads/tvshows}
    temp-path: ${DOWNLOAD_TEMP_PATH:downloads/temp}
    parallel-downloads: ${PARALLEL_DOWNLOADS:10}
    segment-concurrency: ${SEGMENT_CONCURRENCY:5}
    default-quality: ${DEFAULT_QUALITY:best}
    default-language: ${DEFAULT_LANGUAGE:en}

  tmdb:
    api-key: ${TMDB_API_KEY:}

  extractor:
    base-url: https://vixsrc.to

raiplay:
  base-url: https://www.raiplay.it
  search-url: https://www.raiplay.it/atomatic/raiplay-search-service/api/v1/msearch
  search-template-in: ${RAIPLAY_SEARCH_TEMPLATE_IN:6470a982e4e0301afe1f81f1}
  search-template-out: ${RAIPLAY_SEARCH_TEMPLATE_OUT:6516ac5d40da6c377b151642}
  search-page-size: ${RAIPLAY_SEARCH_PAGE_SIZE:48}
  enabled: ${RAIPLAY_ENABLED:true}

  # ── Auto-login (preferred) ────────────────────────────────────────────────
  # Set RAIPLAY_USERNAME + RAIPLAY_PASSWORD and the app will log in
  # automatically via Gigya on startup and refresh the session every 23 hours.
  username: ${RAIPLAY_USERNAME:}
  password: ${RAIPLAY_PASSWORD:}

  # Gigya (SAP CDC) site key embedded in the RaiPlay website JS.
  # Verify via DevTools: any request to accounts.eu1.gigya.com → apiKey param.
  gigya-api-key: ${RAIPLAY_GIGYA_API_KEY:3_zEiEMnMEqZDFtEUvLMbJbMQq82GXvOBkE8MBG4gFqIjI7LyKVBJJXHjXoWgHJBm}

  # RaiPlay endpoint that accepts {"idToken":"<gigya-jwt>"} and returns session cookies.
  # If auto-login fails, check app logs and find the correct URL in DevTools during login.
  gigya-exchange-url: ${RAIPLAY_GIGYA_EXCHANGE_URL:https://www.raiplay.it/login/social}

  # ── Manual cookie fallback ────────────────────────────────────────────────
  # Paste the full Cookie header from a logged-in browser session.
  # Only used when username/password are not set or auto-login fails.
  session-cookie: ${RAIPLAY_SESSION_COOKIE:}

app:
  version: '@project.version@'

spring:
  application:
    name: vixsrc-downloader

  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:data/vixsrc.db}
    driver-class-name: org.sqlite.JDBC

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  # Vaadin configuration
  vaadin:
    launch-browser: false

  # Servlet configuration for large file handling
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true

# Logging
logging:
  level:
    com.github.stormino: ${LOG_LEVEL:INFO}
    okhttp3: WARN
  pattern:
  #   console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/vixsrc-downloader.log}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
