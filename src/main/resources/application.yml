hos:
  download:
    movies-path: ${DOWNLOAD_MOVIES_PATH:downloads/movies}
    tv-shows-path: ${DOWNLOAD_TV_SHOWS_PATH:downloads/tvshows}
    temp-path: ${DOWNLOAD_TEMP_PATH:downloads/temp}
    parallel-downloads: ${PARALLEL_DOWNLOADS:10}
    segment-concurrency: ${SEGMENT_CONCURRENCY:5}
    default-quality: ${DEFAULT_QUALITY:best}
    default-language: ${DEFAULT_LANGUAGE:en}

  tmdb:
    api-key: ${TMDB_API_KEY:}

  monitoring:
    enabled: ${MONITORING_ENABLED:true}
    interval-ms: ${MONITORING_INTERVAL_MS:3600000}

  extractor:
    base-url: https://vixsrc.to

raiplay:
  base-url: https://www.raiplay.it
  search-url: https://www.raiplay.it/atomatic/raiplay-search-service/api/v1/msearch
  search-template-in: ${RAIPLAY_SEARCH_TEMPLATE_IN:6470a982e4e0301afe1f81f1}
  search-template-out: ${RAIPLAY_SEARCH_TEMPLATE_OUT:6516ac5d40da6c377b151642}
  search-page-size: ${RAIPLAY_SEARCH_PAGE_SIZE:48}

  # Set RAIPLAY_USERNAME + RAIPLAY_PASSWORD to enable RaiPlay.  The app logs in
  # via RaiSSO on startup and refreshes the session every 23 h.  If either is
  # blank, all RaiPlay components (provider, API client, auth service, auth
  # interceptor) are skipped entirely – no requests are made and the source
  # does not appear in search results.
  username: ${RAIPLAY_USERNAME:}
  password: ${RAIPLAY_PASSWORD:}

  # Static frontend key sent as domainApiKey in all RaiSSO calls.
  # Embedded in the RaiPlay JS; rotates rarely.
  domain-api-key: ${RAIPLAY_DOMAIN_API_KEY:arSgRtwasD324SaA}

app:
  version: '@project.version@'

spring:
  application:
    name: harvester-of-sorrow

  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:data/hos.db}
    driver-class-name: org.sqlite.JDBC

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  # Vaadin configuration
  vaadin:
    launch-browser: false
    exclude-urls: /swagger-ui/**, /v3/api-docs/**

  # Servlet configuration for large file handling
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true

# Logging
logging:
  level:
    com.github.stormino: ${LOG_LEVEL:INFO}
    okhttp3: WARN
    org.zalando.logbook: TRACE
  pattern:
  #   console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/harvester-of-sorrow.log}

logbook:
  exclude:
    - /actuator/**
    - /swagger-ui/**
    - /v3/api-docs/**
    - /VAADIN/**

# OpenAPI / Swagger UI — available at /swagger-ui.html and /v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  paths-to-exclude: /vaadinServlet/**, /VAADIN/**, /PUSH/**

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
